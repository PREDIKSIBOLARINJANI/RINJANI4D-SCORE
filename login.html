<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RINJANI4D — Admin Login</title>
    <link href="https://images.linkcdn.cloud/V2/507/favicon/favicon-1888287302.png" rel="icon" type="image/png"/>
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Barlow', sans-serif; }
        body {
            background: #000 url('https://i.imgur.com/zGbaikU.jpeg') no-repeat center center/cover;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        body::before {
            content: ""; position: absolute; inset: 0; background: rgba(0,0,0,0.75); z-index: 1;
        }
        .login-card {
            background: rgba(17, 17, 17, 0.95);
            border: 1px solid #ffd700;
            border-radius: 12px;
            padding: 40px 30px;
            width: 100%;
            max-width: 400px;
            z-index: 2;
            box-shadow: 0 4px 20px rgba(255,215,0,0.2);
            text-align: center;
        }
        .logo img { height: 45px; margin-bottom: 25px; }
        h2 { color: #ffd700; margin-bottom: 25px; font-size: 22px; font-weight: 700; }
        .form-group { text-align: left; margin-bottom: 20px; }
        label { color: #ccc; display: block; margin-bottom: 8px; font-size: 14px; }
        input {
            width: 100%; padding: 12px; background: #222; border: 1px solid #444;
            color: #fff; border-radius: 6px; font-size: 14px; transition: 0.3s;
        }
        input:focus { border-color: #ffd700; outline: none; }
        button {
            width: 100%; padding: 12px; background: #ffd700; color: #000;
            border: none; border-radius: 6px; font-weight: 700; font-size: 15px;
            cursor: pointer; margin-top: 10px; transition: 0.3s;
        }
        button:hover { background: #fff; }
        .error-msg { color: #fc8181; font-size: 13px; margin-top: 15px; display: none; }
    </style>
</head>
<body>

<div class="login-card">
    <div class="logo">
        <img src="https://i.imgur.com/DuwlIfJ.png" alt="Logo">
    </div>
    <h2>PANEL KONTROL ADMIN</h2>
    
    <form id="loginForm">
        <div class="form-group">
            <label>Kata Sandi Akses</label>
            <input type="password" id="password" placeholder="Masukkan password admin..." required autocomplete="current-password">
        </div>
        <button type="submit" id="btnLogin">MASUK PANEL</button>
        <div class="error-msg" id="errorMsg">Password salah atau akses ditolak!</div>
    </form>
</div>

<script>
    const API_URL = '/api/simpan-data';

    // Cek jika sudah login sebelumnya (ada token di localStorage), langsung lempar ke admin.html
    function checkDirect() {
        if (localStorage.getItem('admin_session')) {
            window.location.href = 'admin.html';
        }
    }
    checkDirect();

    // Proses Handler Login Baru Menembak ke Netlify Backend
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const password = document.getElementById('password').value.trim();
        const btn = document.getElementById('btnLogin');
        const err = document.getElementById('errorMsg');

        if (!password) return;

        btn.disabled = true;
        btn.textContent = 'Memverifikasi...';
        err.style.color = '#fc8181';
        err.style.display = 'none';

        try {
            // Mengirim request 'cek' untuk memvalidasi password di panggung belakang Netlify
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-Admin-Password': password
                },
                body: JSON.stringify({ aksi: 'cek' })
            });

            const hasil = await response.json();

            if (!response.ok) {
                throw new Error(hasil.error || 'Password salah atau akses ditolak.');
            }

            // Jika sukses lolos dari backend, simpan ke session panggung depan
            err.textContent = '✅ Akses diterima! Mengalihkan...';
            err.style.color = '#68d391';
            err.style.display = 'block';
            
            localStorage.setItem('admin_session', password);

            // Beri jeda 1 detik untuk transisi visual yang halus sebelum pindah halaman
            setTimeout(() => {
                window.location.href = 'admin.html';
            }, 1000);

        } catch (error) {
            err.textContent = '❌ Gagal Masuk: ' + error.message;
            err.style.color = '#fc8181';
            err.style.display = 'block';
            btn.disabled = false;
            btn.textContent = 'MASUK PANEL';
        }
    });
</script>

</body>
</html>
